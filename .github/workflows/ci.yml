name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check pact.decisions schema codegen is up to date
        run: |
          pnpm run schema:codegen
          git diff --exit-code -- schema/pact-decisions src/__codegen__/schema

      - name: Type check
        run: pnpm run lint:typescript

      - name: ESLint
        run: pnpm run lint:eslint

      - name: Run unit tests
        run: pnpm test
