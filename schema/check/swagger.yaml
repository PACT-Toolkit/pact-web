basePath: /
definitions:
    check.CausalSpanInfo:
        properties:
            end:
                type: integer
            start:
                type: integer
        type: object
    check.CheckRequest:
        properties:
            content:
                type: string
            conversation_id:
                description: |-
                    ConversationID is an optional client-supplied chat/thread correlation id.
                    Mirrored verbatim onto the pact.decisions audit event so a decision can
                    be traced back to the chat session that produced it. May also be supplied
                    via the X-Pact-Conversation-Id header; the body value wins when both are
                    present. Opaque to the gateway — never parsed or validated.
                type: string
            external_refs:
                description: |-
                    ExternalRefs is an optional list of third-party references (URLs) the
                    gateway fetches in an isolated worker and re-scans for indirect prompt
                    injection (PACT-236). When present and the sandbox is enabled, the request
                    blocks if any reference is hostile — before the caller passes the fetched
                    content to its LLM. Unlike SpotlightChunks, the content is NOT supplied
                    inline; the gateway fetches it.
                items:
                    $ref: '#/definitions/check.ExternalRef'
                type: array
            kind:
                description: '"input" | "output"'
                type: string
            spotlight_chunks:
                description: |-
                    SpotlightChunks is an optional list of third-party content chunks the host
                    wants spotlight-wrapped before LLM injection. Populated on allow path only.
                items:
                    $ref: '#/definitions/check.SpotlightChunk'
                type: array
            traffic_source:
                description: |-
                    TrafficSource is the caller's own declaration of synthetic vs real
                    traffic (e.g. "benchmark"), mirrored verbatim onto the pact.decisions
                    audit event (PACT-484). Attribution only - it carries no access-control
                    weight and is never used to grant or deny a request. Optional; when
                    present it must match ^[a-z0-9_-]{1,32}$, the same pattern the
                    decisions schema enforces on the audit event.
                type: string
        required:
            - content
            - kind
        type: object
    check.CheckResponse:
        properties:
            classifier:
                $ref: '#/definitions/check.ClassifierInfo'
            decision:
                enum:
                    - allow
                    - block
                type: string
            diagnostics:
                $ref: '#/definitions/check.DiagnosticsInfo'
            external_refs:
                $ref: '#/definitions/check.ExternalRefsInfo'
            filter:
                $ref: '#/definitions/check.FilterInfo'
            filter_rule_id:
                type: string
            latency_ms:
                type: integer
            reason:
                type: string
            redactor:
                $ref: '#/definitions/check.RedactorInfo'
            request_id:
                type: string
            spotlight:
                $ref: '#/definitions/check.SpotlightInfo'
        required:
            - decision
            - latency_ms
            - request_id
        type: object
    check.ClassifierInfo:
        properties:
            engine:
                description: |-
                    Engine is the exercised classifier model version as echoed by
                    pact-classifier; absent when the classifier stage did not run or did
                    not report one.
                type: string
            label:
                type: string
            score:
                type: number
        type: object
    check.DiagnosticsInfo:
        properties:
            causal_spans:
                items:
                    $ref: '#/definitions/check.CausalSpanInfo'
                type: array
        type: object
    check.ExternalRef:
        properties:
            source:
                type: string
            url:
                type: string
        type: object
    check.ExternalRefInfo:
        properties:
            host:
                type: string
            purified_content:
                type: string
            source:
                type: string
            verdict:
                enum:
                    - clean
                    - hostile
                    - unfetchable
                    - skipped
                    - blocked
                    - mitigated
                type: string
        type: object
    check.ExternalRefsInfo:
        properties:
            blocked:
                type: integer
            mitigated:
                type: integer
            refs:
                items:
                    $ref: '#/definitions/check.ExternalRefInfo'
                type: array
            scanned:
                type: integer
        type: object
    check.FilterInfo:
        properties:
            rule_id:
                type: string
            shadow:
                description: true when the match was a dry-run / shadow rule
                type: boolean
            verdict:
                enum:
                    - safe
                    - suspicious
                    - hostile
                    - unknown
                type: string
        type: object
    check.RedactedSpan:
        properties:
            end:
                type: integer
            label:
                type: string
            start:
                type: integer
        required:
            - end
            - start
        type: object
    check.RedactorInfo:
        properties:
            spans:
                items:
                    $ref: '#/definitions/check.RedactedSpan'
                type: array
            verdict:
                enum:
                    - pass_through
                    - redacted
                    - unknown
                type: string
        type: object
    check.SpotlightChunk:
        properties:
            content:
                type: string
            source:
                description: e.g. "rag:doc#42", "tool:search", "url:https://…"
                type: string
            trust:
                enum:
                    - trusted
                    - user
                    - untrusted
                type: string
        type: object
    check.SpotlightInfo:
        properties:
            chunks:
                items:
                    $ref: '#/definitions/check.WrappedChunk'
                type: array
            format:
                enum:
                    - delim
                    - xml
                    - json
                type: string
            header:
                description: system-prompt fragment; only when SPOTLIGHT_INJECT_HEADER=true
                type: string
            source_count:
                type: integer
        type: object
    check.WrappedChunk:
        properties:
            source:
                type: string
            trust:
                enum:
                    - trusted
                    - user
                    - untrusted
                type: string
            wrapped:
                description: nonce-tagged marker envelope ready for LLM injection
                type: string
        type: object
host: localhost:8080
info:
    contact: {}
    description: Public REST entrypoint for the PACT safety pipeline.
    title: pact-gateway
    version: 0.1.0
paths:
    /v1/check:
        post:
            consumes:
                - application/json
            operationId: checkContent
            parameters:
                - description: Content and kind (input|output); optional conversation_id, traffic_source
                  in: body
                  name: body
                  required: true
                  schema:
                    $ref: '#/definitions/check.CheckRequest'
                - description: Client chat/thread correlation id for the audit trail (body conversation_id wins when both supplied)
                  in: header
                  name: X-Pact-Conversation-Id
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/check.CheckResponse'
                "400":
                    description: malformed request
                    schema:
                        type: string
                "401":
                    description: missing or invalid bearer token
                    schema:
                        type: string
                "429":
                    description: per-IP rate limit exceeded
                    schema:
                        type: string
                "503":
                    description: auth dependency unavailable
                    schema:
                        type: string
                "504":
                    description: request exceeded timeout
                    schema:
                        type: string
            security:
                - Bearer: []
            summary: Evaluate content against the safety pipeline
            tags:
                - check
schemes:
    - http
    - https
securityDefinitions:
    Bearer:
        description: 'Opaque pact-auth session token. Format: <uuid>.<base64-hmac>.'
        in: header
        name: Authorization
        type: apiKey
swagger: "2.0"
