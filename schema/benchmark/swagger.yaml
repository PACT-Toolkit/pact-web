basePath: /
definitions:
    benchmark.BenchmarkRunBody:
        properties:
            corpus_version:
                type: string
            detection_rate:
                type: number
            engine:
                type: string
            fp_rate:
                type: number
            gateway_version:
                type: string
            id:
                type: string
            p50_latency:
                type: number
            p99_latency:
                type: number
            ran_at:
                type: integer
            row_count:
                type: integer
        required:
            - corpus_version
            - detection_rate
            - engine
            - fp_rate
            - gateway_version
            - id
            - p50_latency
            - p99_latency
            - ran_at
            - row_count
        type: object
    benchmark.GetJobResponse:
        properties:
            error:
                type: string
            progress_pct:
                type: integer
            result:
                $ref: '#/definitions/benchmark.JobResultBody'
            status:
                type: string
        required:
            - progress_pct
            - status
        type: object
    benchmark.JobResultBody:
        properties:
            detection_rate:
                type: number
            fp_rate:
                type: number
            p50_latency_ms:
                type: number
            p99_latency_ms:
                type: number
            rows:
                items:
                    $ref: '#/definitions/benchmark.JobRowBody'
                type: array
            total_rows:
                type: integer
        required:
            - detection_rate
            - fp_rate
            - p50_latency_ms
            - p99_latency_ms
            - rows
            - total_rows
        type: object
    benchmark.JobRowBody:
        properties:
            decision:
                type: string
            error:
                type: string
            expected_label:
                type: string
            latency_ms:
                type: number
            row_id:
                type: string
        required:
            - decision
            - expected_label
            - latency_ms
            - row_id
        type: object
    benchmark.ListRunsResponse:
        properties:
            runs:
                items:
                    $ref: '#/definitions/benchmark.BenchmarkRunBody'
                type: array
            total:
                type: integer
        required:
            - runs
            - total
        type: object
    benchmark.SubmitJobRequest:
        properties:
            corpus_jsonl:
                type: string
            engine:
                type: string
            gateway_url:
                type: string
        required:
            - corpus_jsonl
            - gateway_url
        type: object
    benchmark.SubmitJobResponse:
        properties:
            job_id:
                type: string
        required:
            - job_id
        type: object
host: localhost:8080
info:
    contact: {}
    description: Public REST entrypoint for the PACT safety pipeline.
    title: pact-gateway
    version: 0.1.0
paths:
    /v1/benchmark/jobs:
        post:
            consumes:
                - application/json
            operationId: submitBenchmarkJob
            parameters:
                - description: Corpus and target configuration
                  in: body
                  name: body
                  required: true
                  schema:
                    $ref: '#/definitions/benchmark.SubmitJobRequest'
            produces:
                - application/json
            responses:
                "202":
                    description: Accepted
                    schema:
                        $ref: '#/definitions/benchmark.SubmitJobResponse'
                "400":
                    description: invalid request body
                    schema:
                        type: string
                "401":
                    description: missing or invalid bearer token
                    schema:
                        type: string
                "502":
                    description: upstream error
                    schema:
                        type: string
            security:
                - Bearer: []
            summary: Submit a benchmark corpus job
            tags:
                - benchmark
    /v1/benchmark/jobs/{id}:
        get:
            operationId: getBenchmarkJob
            parameters:
                - description: Job ID
                  in: path
                  name: id
                  required: true
                  type: string
                - description: Row page offset (default 0)
                  in: query
                  name: offset
                  type: integer
                - description: Max rows to return (default 100)
                  in: query
                  name: limit
                  type: integer
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/benchmark.GetJobResponse'
                "400":
                    description: invalid query parameter
                    schema:
                        type: string
                "401":
                    description: missing or invalid bearer token
                    schema:
                        type: string
                "404":
                    description: not found
                    schema:
                        type: string
                "502":
                    description: upstream error
                    schema:
                        type: string
            security:
                - Bearer: []
            summary: Poll a benchmark job's status and result
            tags:
                - benchmark
    /v1/benchmark/runs:
        get:
            operationId: listBenchmarkRuns
            parameters:
                - description: Max runs to return (0 or omitted = 100)
                  in: query
                  name: limit
                  type: integer
                - description: Page offset (default 0)
                  in: query
                  name: offset
                  type: integer
                - description: Lower bound on ran_at (Unix seconds, 0 = none)
                  in: query
                  name: since_unix
                  type: integer
                - description: Upper bound on ran_at (Unix seconds, 0 = none)
                  in: query
                  name: until_unix
                  type: integer
                - description: Filter by exact gateway version tag
                  in: query
                  name: gateway_version
                  type: string
            produces:
                - application/json
            responses:
                "200":
                    description: OK
                    schema:
                        $ref: '#/definitions/benchmark.ListRunsResponse'
                "400":
                    description: invalid query parameter
                    schema:
                        type: string
                "401":
                    description: missing or invalid bearer token
                    schema:
                        type: string
                "502":
                    description: upstream error
                    schema:
                        type: string
            security:
                - Bearer: []
            summary: List persisted benchmark run history
            tags:
                - benchmark
schemes:
    - http
    - https
securityDefinitions:
    Bearer:
        description: 'Opaque pact-auth session token. Format: <uuid>.<base64-hmac>.'
        in: header
        name: Authorization
        type: apiKey
swagger: "2.0"
